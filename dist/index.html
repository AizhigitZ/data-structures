<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive Data Structures & Algorithms dashboard with live demos, theory cards, and Python code for Searching, Sorting, Stack, Linked List, Hash Functions and Queues." />
    <title>DS&A Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body, #root {
        margin: 0; padding: 0; height: 100%;
        background: #020510;
        color: #c8d8f0;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #0f2040; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #1a3a6a; }

      /* ── Keyframe animations ── */
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.5; }
        50%       { opacity: 1; }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-4px); }
      }

      .fade-in { animation: fadeSlideIn 0.35s ease both; }

      /* ── Gradient text utility ── */
      .grad-text {
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-CDLEb9IB.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
